<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="clipTop">
      <polygon points="287,305 67,178 225,87 445,214"/>
    </clipPath>
    <clipPath id="clipFront">
      <polygon points="287,481 67,354 67,178 287,305"/>
    </clipPath>
    <clipPath id="clipPaper">
      <polygon points="347,257 149,143 179,13 377,127"/>
    </clipPath>

    <!-- Paper gradient: bright/clean at top, softly shadowed near slot -->
    <linearGradient id="paperGrad" gradientUnits="userSpaceOnUse"
                    x1="263" y1="13" x2="248" y2="210">
      <stop offset="0%"   stop-color="#f8f8f3"/>
      <stop offset="55%"  stop-color="#efefea"/>
      <stop offset="100%" stop-color="#d0d0ca"/>
    </linearGradient>

    <!-- Subtle drop-shadow for paper depth -->
    <filter id="paperShadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="3" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" ry="100" fill="#714B67"/>

  <!-- ── Box Faces ── -->
  <polygon points="287,481  67,354  67,178 287,305"
           fill="#1c1c1c" stroke="#1c1c1c" stroke-width="1.5"/>
  <polygon points="287,481 445,390 445,214 287,305"
           fill="#2c2c2c" stroke="#2c2c2c" stroke-width="1.5"/>
  <polygon points="287,305  67,178 225,87  445,214"
           fill="#3c3c3c" stroke="#3c3c3c" stroke-width="1.5"/>

  <!-- Paper slot on top face -->
  <polygon clip-path="url(#clipTop)"
           points="69,97 427,304 443,295 85,88"
           fill="#080808" stroke="#080808" stroke-width="1"/>

  <!-- ── Receipt paper with gradient + soft shadow ── -->
  <polygon points="347,257 149,143 179,13 377,127"
           fill="url(#paperGrad)"
           filter="url(#paperShadow)"/>

  <!-- Paper right edge highlight (gives it a slight 3D curl feel) -->
  <line x1="377" y1="127" x2="347" y2="257"
        stroke="#fff" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round"/>

  <!-- ── Receipt lines — varied lengths & weights simulating printed text ── -->
  <!-- Line 1 — full width, darkest (near slot) -->
  <line clip-path="url(#clipPaper)"
        x1="154" y1="120" x2="352" y2="234"
        stroke="#909090" stroke-width="6" stroke-linecap="round"/>
  <!-- Line 2 — 75% width -->
  <line clip-path="url(#clipPaper)"
        x1="157" y1="107" x2="306" y2="192"
        stroke="#9a9a9a" stroke-width="6" stroke-linecap="round"/>
  <!-- Line 3 — full width -->
  <line clip-path="url(#clipPaper)"
        x1="160" y1="94" x2="358" y2="208"
        stroke="#9a9a9a" stroke-width="5" stroke-linecap="round"/>
  <!-- Line 4 — 85% width -->
  <line clip-path="url(#clipPaper)"
        x1="163" y1="81" x2="331" y2="177"
        stroke="#a8a8a8" stroke-width="5" stroke-linecap="round"/>
  <!-- Line 5 — full width -->
  <line clip-path="url(#clipPaper)"
        x1="166" y1="68" x2="364" y2="182"
        stroke="#a8a8a8" stroke-width="4" stroke-linecap="round"/>
  <!-- Line 6 — 60% width (short paragraph end) -->
  <line clip-path="url(#clipPaper)"
        x1="169" y1="55" x2="288" y2="123"
        stroke="#b8b8b8" stroke-width="4" stroke-linecap="round"/>
  <!-- Line 7 — full width -->
  <line clip-path="url(#clipPaper)"
        x1="172" y1="42" x2="370" y2="156"
        stroke="#bbbbbb" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Line 8 — 70% width, lightest (near top) -->
  <line clip-path="url(#clipPaper)"
        x1="175" y1="29" x2="314" y2="108"
        stroke="#c8c8c8" stroke-width="3" stroke-linecap="round"/>

  <!-- Exit slot (front face) -->
  <polygon clip-path="url(#clipFront)"
           points="-20,272 374,499 374,519 -20,292"
           fill="#080808" stroke="#080808" stroke-width="1"/>

</svg>
